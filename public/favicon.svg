<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>
  <!-- Purple face circle -->
  <circle cx="16" cy="16" r="13" fill="#7c3aed"/>
  <!-- Eyes (glasses style: two circles with a bridge) -->
  <circle cx="11" cy="14" r="4" fill="none" stroke="#ffffff" stroke-width="1.8"/>
  <circle cx="21" cy="14" r="4" fill="none" stroke="#ffffff" stroke-width="1.8"/>
  <line x1="15" y1="14" x2="17" y2="14" stroke="#ffffff" stroke-width="1.8"/>
  <!-- Pupils -->
  <circle cx="11" cy="14" r="1.5" fill="#ffffff"/>
  <circle cx="21" cy="14" r="1.5" fill="#ffffff"/>
  <!-- Smile -->
  <path d="M11 20 Q16 24 21 20" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
</svg>
